apiVersion: v1
kind: List
items:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: ${APP_INSTANCE_NAME}
      namespace: ${NAMESPACE}
      labels:
        app: ${APP_INSTANCE_NAME}
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: ${APP_INSTANCE_NAME}
      template:
        metadata:
          labels:
            app: ${APP_INSTANCE_NAME}
        spec:
          containers:
            - name: app
              image: ${PMOMAX_APP_IMAGE}
              imagePullPolicy: IfNotPresent
              ports:
                - containerPort: ${PMOMAX_APP_PORT}
              env:
                - name: PORT
                  value: "${PMOMAX_APP_PORT}"
              resources:
                requests:
                  cpu: 500m
                  memory: 2Gi
                  ephemeral-storage: 1Gi
                limits:
                  ephemeral-storage: 1Gi
              readinessProbe:
                httpGet:
                  path: /health
                  port: ${PMOMAX_APP_PORT}
                initialDelaySeconds: 10
                periodSeconds: 10
              livenessProbe:
                httpGet:
                  path: /health
                  port: ${PMOMAX_APP_PORT}
                initialDelaySeconds: 20
                periodSeconds: 20
  - apiVersion: v1
    kind: Service
    metadata:
      name: ${APP_INSTANCE_NAME}
      namespace: ${NAMESPACE}
      labels:
        app: ${APP_INSTANCE_NAME}
    spec:
      type: LoadBalancer
      selector:
        app: ${APP_INSTANCE_NAME}
      ports:
        - name: http
          port: 80
          targetPort: ${PMOMAX_APP_PORT}
