apiVersion: apps/v1
kind: Deployment
metadata:
  name: pmomax
  labels:
    app.kubernetes.io/name: pmomax
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pmomax
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pmomax
    spec:
      imagePullSecrets:
        - name: icr-secret
      containers:
        - name: pmomax
          image: icr.io/REPLACE_NAMESPACE/pmomax:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: pmomax-config
            - secretRef:
                name: pmomax-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1024Mi"
          volumeMounts:
            - name: pmomax-assets
              mountPath: /tmp/pmomax-assets
      volumes:
        - name: pmomax-assets
          emptyDir: {}
