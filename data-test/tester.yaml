apiVersion: batch/v1
kind: Job
metadata:
  name: ${APP_INSTANCE_NAME}-tester
  namespace: ${NAMESPACE}
  labels:
    app: ${APP_INSTANCE_NAME}
    component: tester
  annotations:
    marketplace.cloud.google.com/verification: "test"
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: ${APP_INSTANCE_NAME}
        component: tester
    spec:
      restartPolicy: Never
      containers:
        - name: curl
          image: ${TESTER_IMAGE}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              ATTEMPTS=0
              until curl -fsS "http://${APP_INSTANCE_NAME}:80/health" || [ $ATTEMPTS -eq 12 ]; do
                echo "Waiting for service (attempt $ATTEMPTS)..."
                ATTEMPTS=$((ATTEMPTS+1))
                sleep 10
              done
              curl -fsS "http://${APP_INSTANCE_NAME}:80/health"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 250m
              memory: 256Mi
              ephemeral-storage: 512Mi
