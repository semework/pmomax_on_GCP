apiVersion: app.k8s.io/v1beta1
kind: Application
metadata:
  name: ${APP_INSTANCE_NAME}
  namespace: ${NAMESPACE}
spec:
  selector:
    matchLabels:
      app: ${APP_INSTANCE_NAME}
  componentKinds:
    - group: apps
      kind: Deployment
    - group: ""
      kind: Service
  descriptor:
    type: "web-service"
    description: "PMOMax PID Architect – AI-powered Project Initiation Document workspace."
    version: "2.1.24"
    links:
      - description: "Documentation"
        url: "https://docs.pmomax.com"
  addOwnerRef: true
