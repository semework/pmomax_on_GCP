<rect x='360' y='240' width='200' height='120' class='module'/>
<text x='420' y='265' class='label'>Service</text>
<rect x='380' y='285' width='160' height='55' class='tile'/>
<text x='395' y='318' class='text'>LoadBalancer</text>
<rect x='590' y='220' width='140' height='170' class='module'/>
