<rect x='70' y='130' width='720' height='520' class='inner'/>
<text x='300' y='155' class='label'>PMOMax – GKE Environment</text>
<rect x='100' y='180' width='660' height='430' class='box'/>
<text x='350' y='205' class='label'>Control Plane</text>
