<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='720' viewBox='0 0 1200 720'>
<defs>
<style><![CDATA[
.title{font:700 20px Arial, sans-serif; fill:#333}
.label{font:700 14px Arial, sans-serif; fill:#1f2937}
.text{font:12px Arial, sans-serif; fill:#111}
.small{font:11px Arial, sans-serif; fill:#111}
.box{fill:#e6f0ff; stroke:#2c5aa0; stroke-width:2}
.outer{fill:#4575d4; stroke:#234a8c; stroke-width:2}
.inner{fill:#f5f6f7; stroke:#111; stroke-width:1.5}
.module{fill:#d9d9d9; stroke:#555; stroke-width:1.5}
.tile{fill:#fff; stroke:#777; stroke-width:1}
.arrow{stroke:#333; stroke-width:1.5; fill:none; marker-end:url(#arrow)}
.arrow-dot{stroke:#333; stroke-width:1.5; fill:none; stroke-dasharray:4 4; marker-end:url(#arrow)}
]]></style>
<marker id='arrow' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='6' markerHeight='6' orient='auto-start-reverse'>
<path d='M 0 0 L 10 5 L 0 10 z' fill='#333'/>
</marker>
</defs>
