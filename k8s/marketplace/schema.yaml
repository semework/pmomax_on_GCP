# Skeleton schema for PMOMax Kubernetes Marketplace app
# Extend this file according to Google Cloud Marketplace Kubernetes
# application requirements.

apiVersion: marketplace.cloud.google.com/v1alpha1
kind: Schema
metadata:
  name: pmomax-pid-architect-schema
spec:
  applicationMeta:
    name: "PMOMax PID Architect (Kubernetes)"
    shortDescription: "AI-assisted Project Initiation Document (PID) workspace."
  properties:
    namespace:
      type: string
      title: "Namespace"
      description: "Kubernetes namespace where the application will be installed."
      default: "pmomax"
    replicas:
      type: integer
      title: "Replica count"
      description: "Number of application replicas."
      default: 2
      minimum: 1
    image:
      type: string
      title: "Container image"
      description: "Full container image reference (Artifact Registry)."
      default: "us-docker.pkg.dev/katalyststreet-public/pmomax/pmo-architect:1.0"
    serviceType:
      type: string
      title: "Service type"
      description: "Type of Kubernetes Service used for external access."
      default: "LoadBalancer"
      enum:
        - LoadBalancer
        - ClusterIP
