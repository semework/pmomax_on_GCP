x-google-marketplace:
  schemaVersion: v2
  applicationApiVersion: v1beta1
  publishedVersion: "1.0.1"
  publishedVersionMetadata:
    releaseNote: >-
      PMOMax 1.0.1 - Production release with hardened deployer logic.
    recommended: true
  managedUpdates:
    kalmSupported: false
  images:
    deployer:
      properties:
        deployerImageRegistry:
          type: REGISTRY
        deployerImageRepo:
          type: REPO_WITHOUT_REGISTRY
        deployerImageTag:
          type: TAG

properties:
  APP_INSTANCE_NAME:
    type: string
    default: pmo-architect
    x-google-marketplace:
      type: NAME

  NAMESPACE:
    type: string
    x-google-marketplace:
      type: NAMESPACE

  reportingSecret:
    type: string
    x-google-marketplace:
      type: REPORTING_SECRET

  DOMAIN:
    type: string
    default: pmomax.example.com

  deployerServiceAccount:
    type: string
    title: Service Account for deployer
    default: deployer-sa
    x-google-marketplace:
      type: SERVICE_ACCOUNT
      serviceAccount:
        description: Used by deployer to manage Kubernetes resources during installation and cleanup.
        roles:
          - type: ClusterRole
            rulesType: CUSTOM
            rules:
              - apiGroups: [""]
                resources:
                  - pods
                  - services
                  - serviceaccounts
                  - configmaps
                  - secrets
                  - persistentvolumeclaims
                  - events
                verbs:
                  - get
                  - list
                  - create
                  - update
                  - patch
                  - delete
                  - watch
              - apiGroups: ["apps"]
                resources:
                  - deployments
                  - statefulsets
                  - replicasets
                  - daemonsets
                verbs:
                  - get
                  - list
                  - create
                  - update
                  - patch
                  - delete
                  - watch
              - apiGroups: ["rbac.authorization.k8s.io"]
                resources:
                  - roles
                  - rolebindings
                  - clusterroles
                  - clusterrolebindings
                verbs:
                  - get
                  - list
                  - create
                  - update
                  - patch
                  - delete
                  - watch
              - apiGroups: ["app.k8s.io"]
                resources:
                  - applications
                verbs:
                  - get
                  - list
                  - create
                  - update
                  - patch
                  - delete
                  - watch
              - apiGroups: ["networking.k8s.io"]
                resources:
                  - ingresses
                  - networkpolicies
                verbs:
                  - get
                  - list
                  - create
                  - update
                  - patch
                  - delete
              - apiGroups: ["batch"]
                resources:
                  - jobs
                verbs:
                  - get
                  - list
                  - create
                  - update
                  - patch
                  - delete
                  - watch

  deployer.image:
    type: string
    default: us-docker.pkg.dev/katalyststreet-public/pmomax/deployer:1.0.1
    x-google-marketplace:
      type: DEPLOYER_IMAGE

  deployerImageRepo:
    type: string
    default: katalyststreet-public/pmomax/deployer

  deployerImageTag:
    type: string
    default: "1.0.1"

  PMOMAX_APP_IMAGE:
    type: string
    default: us-east1-docker.pkg.dev/katalyststreet-public/apps/pmo-architect:1.0.1

  pmomaxAppRepo:
    type: string
    default: us-east1-docker.pkg.dev/katalyststreet-public/apps/pmo-architect

  pmomaxAppTag:
    type: string
    default: "1.0.1"

  PMOMAX_APP_PORT:
    type: integer
    default: 8080

  TESTER_IMAGE:
    type: string
    default: curlimages/curl:8.12.1

  PARTNER_ID:
    type: string
    default: katalyststreet

  PRODUCT_ID:
    type: string
    default: pmomax

  GCP_PROJECT_ID:
    type: string
    default: katalyststreet-public

required:
  - APP_INSTANCE_NAME
  - NAMESPACE
  - reportingSecret
